version: '3'
services:
 php:
   container_name: php-training1
   build:
     context: "./"
     dockerfile: ./docker/php/Dockerfile
   volumes:
     - ./app:/var/www
   depends_on:
     - mysql
   working_dir: /var/www

 nginx:
   container_name: nginx-training1
   image: nginx:latest
   ports:
     - 8080:80
   volumes:
     - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
     - ./app:/var/www
   depends_on:
     - php

 mysql:
  container_name: mysql-training1
  build:
    context: "./"
    dockerfile: ./docker/mysql/Dockerfile
  ports:
   - "3306:3306"
  volumes:
   - ./docker/mysql/initdb.d:/docker-entrypoint-initdb.d
   - mysql-data:/var/lib/mysql
  environment:
    - MYSQL_ROOT_PASSWORD=root
    - MYSQL_DATABASE=training
    - MYSQL_USER=training
    - MYSQL_PASSWORD=secret

volumes:
   mysql-data:
     driver: local
